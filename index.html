<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingMessage">Loading images...</div>
    <div id="scoreBoard">DISTANCE: 0</div>
    <div id="playerHealth">HP: 5</div>
    <div id="bossHealth">BOSS HP</div>
    <div id="bossHealthBar"><div id="bossHealthFill"></div></div>
    <div id="startMessage">Click to Start!<br><small>Avoid obstacles, defeat the boss!</small></div>
    <div id="gameOver">
        YOU LOST!
        <p>Click to restart</p>
    </div>
    <div id="victoryMessage">
        YOU WON!
    </div>
    <div id="instructions">
        Click = Jump | Double Click = Double Jump | P = Pause | H = Shortcut (Boss in 30s) | WASD = Move (Boss) | Space = Shoot (Boss)
    </div>
    <canvas id="gameCanvas"></canvas>

    <script type="module" src="main.js"></script>
</body>
</html>
